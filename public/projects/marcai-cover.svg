<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="90" x2="960" y2="90"/>
    <line x1="0" y1="180" x2="960" y2="180"/>
    <line x1="0" y1="270" x2="960" y2="270"/>
    <line x1="0" y1="360" x2="960" y2="360"/>
    <line x1="0" y1="450" x2="960" y2="450"/>
    <line x1="160" y1="0" x2="160" y2="540"/>
    <line x1="320" y1="0" x2="320" y2="540"/>
    <line x1="480" y1="0" x2="480" y2="540"/>
    <line x1="640" y1="0" x2="640" y2="540"/>
    <line x1="800" y1="0" x2="800" y2="540"/>
  </g>

  <!-- Calendar card -->
  <rect x="540" y="80" width="340" height="380" rx="16" fill="url(#card-grad)" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Calendar header -->
  <rect x="540" y="80" width="340" height="56" rx="16" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="540" y="112" width="340" height="24" fill="#ffffff" fill-opacity="0.15"/>
  <text x="710" y="116" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Maio 2025</text>

  <!-- Day labels -->
  <g font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.6" text-anchor="middle">
    <text x="567" y="158">Seg</text>
    <text x="616" y="158">Ter</text>
    <text x="665" y="158">Qua</text>
    <text x="714" y="158">Qui</text>
    <text x="763" y="158">Sex</text>
    <text x="812" y="158">Sáb</text>
    <text x="861" y="158">Dom</text>
  </g>

  <!-- Calendar days with appointment dots -->
  <g font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">
    <!-- Row 1 -->
    <text x="567" y="193">1</text>
    <text x="616" y="193">2</text>
    <text x="665" y="193">3</text>
    <text x="714" y="193">4</text>
    <text x="763" y="193">5</text>
    <text x="812" y="193">6</text>
    <text x="861" y="193">7</text>
    <!-- Dots -->
    <circle cx="567" cy="200" r="3" fill="#38bdf8" opacity="0.9"/>
    <circle cx="714" cy="200" r="3" fill="#38bdf8" opacity="0.9"/>
    <circle cx="763" cy="200" r="3" fill="#38bdf8" opacity="0.9"/>

    <!-- Row 2 -->
    <text x="567" y="233">8</text>
    <text x="616" y="233">9</text>
    <text x="665" y="233">10</text>
    <text x="714" y="233">11</text>
    <text x="763" y="233">12</text>
    <text x="812" y="233">13</text>
    <text x="861" y="233">14</text>
    <circle cx="616" cy="240" r="3" fill="#38bdf8" opacity="0.9"/>
    <circle cx="812" cy="240" r="3" fill="#38bdf8" opacity="0.9"/>

    <!-- Row 3 — highlighted today -->
    <rect x="697" y="248" width="34" height="30" rx="8" fill="#0ea5e9" opacity="0.8"/>
    <text x="567" y="270">15</text>
    <text x="616" y="270">16</text>
    <text x="665" y="270">17</text>
    <text x="714" y="270" font-weight="700">18</text>
    <text x="763" y="270">19</text>
    <text x="812" y="270">20</text>
    <text x="861" y="270">21</text>
    <circle cx="567" cy="277" r="3" fill="#38bdf8" opacity="0.9"/>
    <circle cx="665" cy="277" r="3" fill="#38bdf8" opacity="0.9"/>
    <circle cx="763" cy="277" r="3" fill="#38bdf8" opacity="0.9"/>
    <circle cx="861" cy="277" r="3" fill="#38bdf8" opacity="0.9"/>

    <!-- Row 4 -->
    <text x="567" y="310">22</text>
    <text x="616" y="310">23</text>
    <text x="665" y="310">24</text>
    <text x="714" y="310">25</text>
    <text x="763" y="310">26</text>
    <text x="812" y="310">27</text>
    <text x="861" y="310">28</text>
    <circle cx="616" cy="317" r="3" fill="#38bdf8" opacity="0.9"/>
    <circle cx="714" cy="317" r="3" fill="#38bdf8" opacity="0.9"/>

    <!-- Row 5 -->
    <text x="567" y="350">29</text>
    <text x="616" y="350">30</text>
    <text x="665" y="350">31</text>
    <circle cx="567" cy="357" r="3" fill="#38bdf8" opacity="0.9"/>
  </g>

  <!-- WhatsApp bubble -->
  <rect x="556" y="390" width="308" height="52" rx="12" fill="#25d366" fill-opacity="0.25" stroke="#25d366" stroke-opacity="0.5" stroke-width="1"/>
  <text x="572" y="410" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.9">💬  Agendamento confirmado para amanhã</text>
  <text x="572" y="428" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" fill-opacity="0.55">GPT-4o-mini · Function Calling · WhatsApp</text>

  <!-- Left: Title block -->
  <text x="80" y="180" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">Marcaí</text>
  <text x="80" y="220" font-family="system-ui, sans-serif" font-size="18" fill="#ffffff" fill-opacity="0.75">SaaS de Agendamento</text>

  <!-- Tags -->
  <rect x="80" y="250" width="90" height="26" rx="13" fill="#ffffff" fill-opacity="0.15"/>
  <text x="125" y="268" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Multi-tenant</text>

  <rect x="180" y="250" width="60" height="26" rx="13" fill="#ffffff" fill-opacity="0.15"/>
  <text x="210" y="268" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">PWA</text>

  <rect x="250" y="250" width="48" height="26" rx="13" fill="#ffffff" fill-opacity="0.15"/>
  <text x="274" y="268" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">IA</text>

  <!-- Stats -->
  <rect x="80" y="310" width="380" height="90" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="100" y="345" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.6">STACK</text>
  <text x="100" y="368" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff">Node.js · React · MongoDB · OpenAI · Docker</text>
  <text x="100" y="388" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff">JWT · Zod · Pino · Sentry · GitHub Actions</text>

  <!-- Bottom label -->
  <text x="80" y="490" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.4">Em produção com cliente activo</text>
</svg>
